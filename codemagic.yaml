workflows:
  ios-build:
    name: NieruchomosciAI iOS — TestFlight
    max_build_duration: 90
    instance_type: mac_mini_m2
    environment:
      groups:
        - app_store_credentials   # ASC API key + identifier + issuer (per-app, secure)
        - app_store               # APP_STORE_APPLE_ID
      vars:
        BUNDLE_ID: "pl.nieruchomosciai.app"
        XCODE_WORKSPACE: "mobile/ios/NieruchomosciAI.xcworkspace"
        XCODE_SCHEME: "NieruchomosciAI"
      node: 20
      xcode: latest
      cocoapods: default
    cache:
      cache_paths:
        - $HOME/Library/Caches/CocoaPods
        - $HOME/.npm
        - $CM_BUILD_DIR/mobile/node_modules
    scripts:
      - name: Install mobile deps
        script: cd mobile && npm ci --no-audit --no-fund
      - name: Expo prebuild iOS
        script: cd mobile && npx expo prebuild --platform ios --clean --no-install
      - name: Update CocoaPods to latest
        script: sudo gem install cocoapods --no-document && pod --version
      - name: Pod install
        script: cd mobile/ios && pod install --repo-update
      - name: Initialize keychain
        script: keychain initialize
      - name: Fetch signing files
        script: |
          # ASC API auth + Distribution cert private key — oba przez env vars
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > /tmp/asc_api_key.p8
          chmod 600 /tmp/asc_api_key.p8
          echo "$CERTIFICATE_PRIVATE_KEY" > /tmp/cert_key.pem
          chmod 600 /tmp/cert_key.pem
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key=@file:/tmp/asc_api_key.p8 \
            --certificate-key=@file:/tmp/cert_key.pem \
            --create
      - name: Add certificates to keychain
        script: keychain add-certificates
      - name: Apply signing settings
        script: xcode-project use-profiles
      - name: Bump build number
        script: |
          cd $CM_BUILD_DIR/mobile/ios
          LATEST_BUILD=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key=@file:/tmp/asc_api_key.p8 || echo "0")
          agvtool new-version -all $((${LATEST_BUILD:-0} + 1))
      - name: Build IPA
        script: |
          cd mobile/ios
          # Dynamic detect workspace + scheme (Expo prebuild moze sanityzowac nazwe)
          WORKSPACE=$(ls -d *.xcworkspace 2>/dev/null | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "DEBUG: WORKSPACE=$WORKSPACE SCHEME=$SCHEME"
          ls -la
          xcode-project build-ipa \
            --workspace "$CM_BUILD_DIR/mobile/ios/$WORKSPACE" \
            --scheme "$SCHEME" \
            --archive-flags "-destination 'generic/platform=iOS'"
    artifacts:
      - mobile/ios/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - mobile/ios/build/ios/archive/*.xcarchive
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
        submit_to_app_store: false
